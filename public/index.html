<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영어 사전</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 1.2rem 1rem;
      text-align: center;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 0.25rem; }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    #query {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    #query:focus { border-color: #2d6cdf; }

    #search-btn {
      padding: 0.65rem 1.2rem;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #search-btn:hover  { background: #1a55cc; }
    #search-btn:active { background: #1040a8; }

    main { padding: 1rem; max-width: 720px; margin: 0 auto; }

    .spinner {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #888;
    }

    .spinner.visible { display: block; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-top: 1rem;
    }

    .word-header { margin-bottom: 1rem; }

    .word-header h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d6cdf;
    }

    .word-header .meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.3rem;
    }

    .pronunciation { font-size: 1rem; color: #555; }

    .pos-badge {
      background: #eaf0fd;
      color: #2d6cdf;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    section { margin-top: 1.25rem; }

    section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 0.6rem;
    }

    .definition-item {
      padding: 0.75rem;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border-left: 3px solid #2d6cdf;
    }

    .definition-item .meaning { font-size: 1rem; font-weight: 600; }

    .definition-item .example {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #444;
      font-style: italic;
    }

    .definition-item .example-ko {
      margin-top: 0.2rem;
      font-size: 0.85rem;
      color: #666;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .chip {
      background: #f0f0f0;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .origin-text { font-size: 0.92rem; color: #555; line-height: 1.6; }

    .error-card {
      background: #fff3f3;
      border: 1px solid #ffcccc;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-top: 1rem;
      color: #c0392b;
      font-weight: 600;
    }

    #result { display: none; }
    #error  { display: none; }

    #auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #auth-overlay.hidden { display: none; }
    .auth-box {
      background: white;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .auth-box h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-box p { font-size: 0.85rem; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
    .auth-input {
      width: 100%;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: #2d6cdf; }
    .auth-btn {
      width: 100%;
      padding: 0.65rem;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #1a55cc; }
    .auth-error { font-size: 0.85rem; color: #c0392b; margin-bottom: 0.5rem; display: none; }
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h2>접근 제한</h2>
    <p>이 서비스를 이용하려면 비밀번호를 입력하세요.</p>
    <input id="auth-input" class="auth-input" type="password" placeholder="비밀번호" autocomplete="current-password" autofocus />
    <p class="auth-error" id="auth-error">비밀번호가 올바르지 않습니다.</p>
    <button class="auth-btn" onclick="submitAuth()">확인</button>
  </div>
</div>

<header>
  <h1>영어 사전</h1>
  <p>Claude AI 기반 영어 단어 / 상용구 검색</p>
</header>

<div class="search-bar">
  <input id="query" type="text" placeholder="영어 단어나 상용구를 입력하세요..." autocomplete="off" />
  <button id="search-btn">검색</button>
</div>

<main>
  <div class="spinner" id="spinner">검색 중...</div>
  <div id="error" class="error-card"></div>
  <div id="result" class="card"></div>
</main>

<script>
  if (localStorage.getItem('mydict_auth') === 'true') {
    document.getElementById('auth-overlay').classList.add('hidden');
  }
  document.getElementById('auth-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAuth();
  });
  async function submitAuth() {
    const pw = document.getElementById('auth-input').value;
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem('mydict_auth', 'true');
        document.getElementById('auth-overlay').classList.add('hidden');
      } else {
        errEl.style.display = 'block';
        document.getElementById('auth-input').value = '';
        document.getElementById('auth-input').focus();
      }
    } catch {
      errEl.textContent = '서버 오류가 발생했습니다.';
      errEl.style.display = 'block';
    }
  }

  const queryInput  = document.getElementById('query');
  const searchBtn   = document.getElementById('search-btn');
  const spinner     = document.getElementById('spinner');
  const resultDiv   = document.getElementById('result');
  const errorDiv    = document.getElementById('error');

  function setLoading(on) {
    spinner.classList.toggle('visible', on);
    searchBtn.disabled = on;
    searchBtn.textContent = on ? '검색 중...' : '검색';
  }

  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    resultDiv.style.display = 'none';
  }

  function renderResult(data) {
    errorDiv.style.display = 'none';

    const defs = (data.definitions || []).map(d => `
      <div class="definition-item">
        <div class="meaning">${esc(d.meaning)}</div>
        ${ d.example ? `<div class="example">${esc(d.example)}</div>` : '' }
        ${ d.exampleTranslation ? `<div class="example-ko">${esc(d.exampleTranslation)}</div>` : '' }
      </div>
    `).join('');

    const synonyms = (data.synonyms || []).map(s => `<span class="chip">${esc(s)}</span>`).join('');
    const antonyms = (data.antonyms || []).map(a => `<span class="chip">${esc(a)}</span>`).join('');

    resultDiv.innerHTML = `
      <div class="word-header">
        <h2>${esc(data.word)}</h2>
        <div class="meta">
          ${ data.pronunciation ? `<span class="pronunciation">${esc(data.pronunciation)}</span>` : '' }
          ${ data.partOfSpeech  ? `<span class="pos-badge">${esc(data.partOfSpeech)}</span>` : '' }
        </div>
      </div>

      ${ defs ? `<section><h3>뜻</h3>${defs}</section>` : '' }

      ${ synonyms ? `<section><h3>동의어</h3><div class="chips">${synonyms}</div></section>` : '' }

      ${ antonyms ? `<section><h3>반의어</h3><div class="chips">${antonyms}</div></section>` : '' }

      ${ data.origin ? `<section><h3>어원</h3><p class="origin-text">${esc(data.origin)}</p></section>` : '' }
    `;

    resultDiv.style.display = 'block';
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function search() {
    const q = queryInput.value.trim();
    if (!q) return;

    setLoading(true);
    resultDiv.style.display = 'none';
    errorDiv.style.display  = 'none';

    try {
      const res  = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
      });
      const data = await res.json();

      if (data.error) {
        showError(data.error);
      } else {
        renderResult(data);
      }
    } catch {
      showError('서버에 연결할 수 없습니다. 서버가 실행 중인지 확인해주세요.');
    } finally {
      setLoading(false);
    }
  }

  searchBtn.addEventListener('click', search);
  queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>

</body>
</html>
