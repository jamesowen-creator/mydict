// ─── METACOG QUIZ ─────────────────────────────────────────────────────────────

let mcState = null;

// Extracts display meaning from either review-due (data.short_meaning) or wordbook client format
function getMcMeaning(w) {
  const d = w.data || {};
  const sm = d.short_meaning || w.short_meaning;
  const nu = d.nuance       || w.nuance;
  return sm || (nu ? nu.slice(0, 50) + (nu.length > 50 ? '...' : '') : '(뜻 없음)');
}

function pickMcType(word) {
  const rep  = word.repetitions || 0;
  const rand = Math.random();
  const hasEx = !!word.example_sentence;
  if (rep <= 1) {
    return rand < 0.5 ? 'ox' : 'mc4';
  } else if (rep <= 3) {
    if (rand < 0.4) return 'mc4';
    if (rand < 0.8) return hasEx ? 'fill' : 'mc4';
    return 'subjective';
  } else {
    if (rand < 0.3) return hasEx ? 'fill' : 'subjective';
    return 'subjective';
  }
}

async function initMetacogPage() {
  const container = document.getElementById('metacog-container');
  container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text3)">불러오는 중...</div>';
  try {
    const res = await fetch('/api/review-due', { headers: authHeaders() });
    if (!res.ok) throw new Error('API error');
    const { due_count, words } = await res.json();

    if (due_count === 0) {
      container.innerHTML = `
        <div class="quiz-start-card">
          <div style="font-size:48px;margin-bottom:12px">🎉</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:8px">오늘 복습 완료!</div>
          <div style="font-size:14px;color:var(--text2)">오늘 복습할 단어가 없어요.<br>잘 하고 있어요!</div>
          <button class="btn secondary" style="width:100%;margin-top:20px" onclick="showPage('wordbook')">단어장으로</button>
        </div>`;
      return;
    }

    mcState = { words, current: 0, answered: false, currentType: null, subjAnswer: '',
                summary: { s3: 0, s1: 0, s0: 0 }, generatedExamples: new Set() };
    renderMcQuestion();
  } catch (e) {
    console.error('[metacog] init error:', e);
    container.innerHTML = `<div class="quiz-start-card"><div style="color:var(--wrong);font-size:14px">불러오기 실패. 다시 시도해주세요.</div>
      <button class="btn secondary" style="margin-top:16px;width:100%" onclick="initMetacogPage()">재시도</button></div>`;
  }
}

function renderMcQuestion() {
  const { words, current } = mcState;
  const word  = words[current];
  const total = words.length;
  const type  = pickMcType(word);
  mcState.currentType = type;
  mcState.answered    = false;
  mcState.subjAnswer  = '';

  const pct = (current / total * 100).toFixed(0);
  const isConc = (word.entry_type || 'word') === 'concept';

  // Background example generation for fill type when no sentence exists
  if (type === 'fill' && !word.example_sentence && !mcState.generatedExamples.has(word.id)) {
    mcState.generatedExamples.add(word.id);
    generateMcExample(word);
  }

  const progressHtml = `
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${current + 1} / ${total}</div>
    </div>`;

  const infoHtml = `<div class="metacog-word-info">
    <span>반복 ${word.repetitions || 0}회</span>
    <span>간격 ${word.interval_days || 1}일</span>
    <span>${isConc ? '개념' : '단어'}</span>
  </div>`;

  let body = '';
  if      (type === 'ox')        body = buildMcOX(word, isConc);
  else if (type === 'mc4')       body = buildMcMC4(word);
  else if (type === 'fill')      body = buildMcFill(word);
  else                           body = buildMcSubjective(word, isConc);

  document.getElementById('metacog-container').innerHTML = progressHtml + `
    <div class="metacog-card">
      ${infoHtml}
      ${body}
      <div class="metacog-feedback" id="mc-feedback"></div>
      <div id="mc-self-eval" style="display:none">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-align:center">실제로 얼마나 알고 있었나요?</div>
        <div class="metacog-self-eval">
          <button class="metacog-eval-btn" onclick="submitMcScore(3)">💪<br>확실히 알았어</button>
          <button class="metacog-eval-btn" onclick="submitMcScore(1)">🤔<br>애매하게 맞혔어</button>
          <button class="metacog-eval-btn" onclick="submitMcScore(0)">🎲<br>찍었어·몰랐어</button>
        </div>
      </div>
    </div>`;
}

// ── OX ──
function buildMcOX(word, isConc) {
  const isCorrectShown = Math.random() < 0.5;
  const correctMeaning = getMcMeaning(word);
  let shownMeaning = correctMeaning;
  if (!isCorrectShown) {
    const others = mcState.words.filter(w => w.id !== word.id);
    if (others.length) shownMeaning = getMcMeaning(others[Math.floor(Math.random() * others.length)]);
  }
  mcState.oxCorrect = isCorrectShown;
  const label = isConc ? '이 용어의 설명은' : '이 단어의 뜻은';
  return `
    <div style="font-size:22px;font-weight:700;font-family:'Sora',sans-serif;margin:4px 0">${word.word}</div>
    <div class="metacog-question">${label}<br>"${shownMeaning}"이다</div>
    <div class="metacog-ox-btns">
      <button class="metacog-ox-btn" id="mc-o-btn" onclick="checkMcOX(true)">O</button>
      <button class="metacog-ox-btn" id="mc-x-btn" onclick="checkMcOX(false)">X</button>
    </div>`;
}

function checkMcOX(selected) {
  if (mcState.answered) return;
  mcState.answered = true;
  const isCorrect = selected === mcState.oxCorrect;
  document.getElementById('mc-o-btn').disabled = true;
  document.getElementById('mc-x-btn').disabled = true;
  document.getElementById(selected ? 'mc-o-btn' : 'mc-x-btn').classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById(mcState.oxCorrect ? 'mc-o-btn' : 'mc-x-btn').classList.add('correct');
  showMcFeedback(isCorrect);
  showMcSelfEval();
}

// ── 4지선다 ──
function buildMcMC4(word) {
  const meaning = getMcMeaning(word);
  // Pool: other words in review session + client wordbook
  const others = [
    ...mcState.words.filter(w => w.id !== word.id),
    ...wordbook.filter(w => w.id !== word.id)
  ];
  const wrongs = others.sort(() => Math.random() - 0.5)
    .slice(0, 3).map(w => getMcMeaning(w));
  const fillers = ['해당 없음', '알 수 없음', '정의 없음'];
  while (wrongs.length < 3) wrongs.push(fillers[wrongs.length]);
  const ci = Math.floor(Math.random() * 4);
  const opts = [...wrongs]; opts.splice(ci, 0, meaning);
  mcState.mc4CorrectIdx = ci;
  return `
    <div style="font-size:22px;font-weight:700;font-family:'Sora',sans-serif;margin:4px 0">${word.word}</div>
    <div class="metacog-question">이 단어의 뜻은?</div>
    <div class="metacog-options">
      ${opts.map((o, i) => `<button class="metacog-option" id="mc-opt-${i}" onclick="checkMcMC4(${i})">${o}</button>`).join('')}
    </div>`;
}

function checkMcMC4(selected) {
  if (mcState.answered) return;
  mcState.answered = true;
  const ci = mcState.mc4CorrectIdx;
  const isCorrect = selected === ci;
  document.querySelectorAll('.metacog-option').forEach(b => b.disabled = true);
  document.getElementById(`mc-opt-${selected}`).classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById(`mc-opt-${ci}`).classList.add('correct');
  showMcFeedback(isCorrect);
  showMcSelfEval();
}

// ── 빈칸 채우기 ──
function buildMcFill(word) {
  const sentence = word.example_sentence;
  if (!sentence) { mcState.currentType = 'subjective'; return buildMcSubjective(word, false); }
  const escaped = word.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const blank = sentence.replace(new RegExp(escaped, 'gi'), '____');
  return `
    <div class="metacog-question">빈칸에 알맞은 단어를 쓰세요</div>
    <div style="font-size:15px;line-height:1.8;margin:12px 0;padding:14px;background:var(--surface2);border-radius:var(--radius-sm)">${blank}</div>
    <div class="metacog-fill-wrap">
      <input class="metacog-fill-input" id="mc-fill-input" type="text" placeholder="단어 입력..."
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkMcFill()">
      <button class="btn" style="width:100%" onclick="checkMcFill()">제출</button>
    </div>`;
}

function checkMcFill() {
  if (mcState.answered) return;
  const input = document.getElementById('mc-fill-input');
  const ans = (input.value || '').trim();
  if (!ans) return;
  mcState.answered = true;
  const word = mcState.words[mcState.current];
  const isCorrect = ans.toLowerCase() === word.word.toLowerCase();
  input.disabled = true;
  showMcFeedback(isCorrect, isCorrect ? null : `정답: ${word.word}`);
  showMcSelfEval();
}

// ── 주관식 ──
function buildMcSubjective(word, isConc) {
  const label = isConc ? '이 용어의 설명을 적어보세요' : '이 단어의 뜻을 적어보세요';
  return `
    <div style="font-size:22px;font-weight:700;font-family:'Sora',sans-serif;margin:4px 0">${word.word}</div>
    <div class="metacog-question">${label}</div>
    <div class="metacog-fill-wrap">
      <textarea class="metacog-subj-textarea" id="mc-subj-input" placeholder="뜻을 자유롭게 적어보세요..."></textarea>
      <button class="btn" style="width:100%" onclick="checkMcSubjective()">제출</button>
    </div>`;
}

function checkMcSubjective() {
  if (mcState.answered) return;
  const input = document.getElementById('mc-subj-input');
  const userAns = (input.value || '').trim();
  if (!userAns) return;
  mcState.answered  = true;
  mcState.subjAnswer = userAns.toLowerCase();
  input.disabled = true;

  const word    = mcState.words[mcState.current];
  const meaning = getMcMeaning(word);
  const keywords = meaning.toLowerCase().split(/[\s,·\-]+/).filter(k => k.length > 1);
  const matchCount = keywords.filter(k => mcState.subjAnswer.includes(k)).length;
  const ratio = keywords.length > 0 ? matchCount / keywords.length : 0;

  if (ratio >= 0.5) {
    showMcFeedback(true, `정답 키워드: ${meaning}`);
    showMcSelfEval();
  } else if (ratio >= 0.3) {
    const fb = document.getElementById('mc-feedback');
    fb.className = 'metacog-feedback partial';
    fb.innerHTML = `<div>🤔 핵심 단어가 일부 맞아요!</div>
      <div style="font-size:12px;margin-top:4px;font-weight:400">정답: ${meaning}</div>
      <button class="metacog-ai-check-btn" id="mc-ai-btn" onclick="checkMcWithAI()">🤖 AI로 확인하기</button>
      <div id="mc-ai-result"></div>`;
  } else {
    showMcFeedback(false, `정답: ${meaning}`);
    showMcSelfEval();
  }
}

async function checkMcWithAI() {
  const btn = document.getElementById('mc-ai-btn');
  btn.disabled = true;
  btn.textContent = '판단 중...';
  const word    = mcState.words[mcState.current];
  const meaning = getMcMeaning(word);
  const prompt  = `단어 "${word.word}"의 뜻은 "${meaning}"입니다. 학습자가 "${mcState.subjAnswer}"라고 답했습니다. 이 답이 뜻을 올바르게 표현하고 있나요? "정답" 또는 "오답"으로만 답하세요.`;
  try {
    const res  = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) });
    const data = await res.json();
    const aiVerdict = (data.result || '').trim();
    document.getElementById('mc-ai-result').innerHTML = `
      <div style="margin-top:8px;font-size:13px">AI 판단: <strong>${aiVerdict}</strong></div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">최종 선택:</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <button class="btn" style="background:var(--correct);font-size:12px;padding:8px" onclick="finalizeAI(true)">O 정답</button>
        <button class="btn" style="background:var(--wrong);font-size:12px;padding:8px"   onclick="finalizeAI(false)">X 오답</button>
      </div>`;
  } catch (e) {
    document.getElementById('mc-ai-result').innerHTML = '<div style="color:var(--wrong);font-size:12px;margin-top:6px">AI 확인 실패</div>';
    showMcSelfEval();
  }
}

function finalizeAI(isCorrect) {
  document.getElementById('mc-ai-result').innerHTML =
    isCorrect ? '<div style="color:var(--correct);margin-top:6px;font-size:13px">✓ 정답으로 처리</div>'
              : '<div style="color:var(--wrong);margin-top:6px;font-size:13px">✗ 오답으로 처리</div>';
  showMcSelfEval();
}

// ── 공통 UI ──
function showMcFeedback(isCorrect, extra) {
  const fb = document.getElementById('mc-feedback');
  fb.className = 'metacog-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '✓ 정답!' : '✗ 오답') +
    (extra ? `<div style="font-size:12px;font-weight:400;margin-top:4px">${extra}</div>` : '');
}

function showMcSelfEval() {
  document.getElementById('mc-self-eval').style.display = 'block';
}

async function submitMcScore(score) {
  const word = mcState.words[mcState.current];
  mcState.summary[`s${score}`]++;
  try {
    await fetch('/api/review-result', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ word_id: word.id, score })
    });
  } catch (e) {
    console.error('[metacog] review-result error:', e);
  }
  mcState.current++;
  if (mcState.current >= mcState.words.length) renderMcSummary();
  else renderMcQuestion();
}

function renderMcSummary() {
  const { summary, words } = mcState;
  const total = words.length;
  const minNextDays = words.reduce((min, w) => {
    if (!w.next_review) return min;
    return Math.min(min, Math.ceil((new Date(w.next_review) - Date.now()) / 86400000));
  }, Infinity);

  document.getElementById('metacog-container').innerHTML = `
    <div class="metacog-summary-card">
      <div style="font-size:42px;margin-bottom:12px">🧠</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">복습 완료!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">총 ${total}개 단어</div>
      <div class="metacog-summary-stats">
        <span class="metacog-stat" style="background:rgba(22,163,74,0.12);color:var(--correct)">💪 ${summary.s3}개</span>
        <span class="metacog-stat" style="background:rgba(251,191,36,0.12);color:#b45309">🤔 ${summary.s1}개</span>
        <span class="metacog-stat" style="background:rgba(220,38,38,0.12);color:var(--wrong)">🎲 ${summary.s0}개</span>
      </div>
      ${minNextDays < Infinity ? `<div style="font-size:13px;color:var(--text2);margin:8px 0">다음 복습 예정: <strong>${minNextDays}일 후</strong></div>` : ''}
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:18px">
        <button class="btn" onclick="initMetacogPage()">다시 복습하기</button>
        <button class="btn secondary" onclick="showPage('wordbook')">단어장으로</button>
      </div>
    </div>`;
}

async function generateMcExample(word) {
  try {
    const prompt = `Generate one natural example sentence using the word '${word.word}'. Return only the sentence, nothing else.`;
    const res  = await fetch('/api/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) });
    const data = await res.json();
    const sentence = (data.result || '').trim();
    if (sentence) {
      await fetch(`/api/wordbook/${word.id}/example`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ example_sentence: sentence })
      });
      // Update in-memory so next session can use it immediately
      word.example_sentence = sentence;
    }
  } catch (e) {
    console.error('[metacog] example gen error:', e);
  }
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

// short_meaning 백필
async function backfillShortMeanings() {
  const missing = wordbook.filter(w => !w.short_meaning && (w.lang || 'en') === 'en');
  if (missing.length === 0) return;
  for (const w of missing) {
    try {
      const text = await callAI(`영어 단어 또는 표현 "${w.word}"의 핵심 뜻을 한국어로 5단어 이내로만 답하세요. 다른 설명 없이 뜻만 출력하세요.`);
      w.short_meaning = text.trim().replace(/"/g, '');
    } catch (e) {
      w.short_meaning = w.nuance ? w.nuance.slice(0, 20) : '';
    }
  }
  save();
}

// ─── TTS ─────────────────────────────────────────────────────────────────────
const ttsMemCache = {};
let ttsCurrentAudio = null;

function playTTSFromBtn(btn) {
  const text = decodeURIComponent(btn.dataset.tts);
  const lang = btn.dataset.lang || 'en';
  playTTS(text, lang, btn);
}

async function playTTS(text, lang, btnEl) {
  const key = text + ':' + lang;

  // 팟캐스트가 재생 중이면 일시 정지
  if (podcastPlaying) {
    podcastPlaying = false;
    if (podcastAudio) podcastAudio.pause();
    const _pBtn = document.getElementById('podcast-play-btn');
    if (_pBtn) _pBtn.textContent = '▶';
  }

  // 같은 버튼 재클릭 시 정지
  if (ttsCurrentAudio) {
    ttsCurrentAudio.pause();
    ttsCurrentAudio = null;
    document.querySelectorAll('.tts-btn').forEach(b => {
      b.textContent = '🔊'; b.classList.remove('playing');
    });
    if (btnEl && btnEl.dataset._ttsKey === key) {
      delete btnEl.dataset._ttsKey; return;
    }
  }

  if (btnEl) {
    btnEl.textContent = '⏳';
    btnEl.classList.add('playing');
    btnEl.dataset._ttsKey = key;
  }

  try {
    let url = ttsMemCache[key];
    if (!url) {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, lang })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `서버 오류 (${res.status})`);
      }
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      ttsMemCache[key] = url;
    }

    if (btnEl) btnEl.textContent = '🔉';
    ttsCurrentAudio = new Audio(url);
    ttsCurrentAudio.onended = () => {
      if (btnEl) { btnEl.textContent = '🔊'; btnEl.classList.remove('playing'); delete btnEl.dataset._ttsKey; }
      ttsCurrentAudio = null;
    };
    ttsCurrentAudio.onerror = (e) => {
      if (btnEl) { btnEl.textContent = '🔊'; btnEl.classList.remove('playing'); delete btnEl.dataset._ttsKey; }
      ttsCurrentAudio = null;
      showToast('오디오 재생 오류');
      console.warn('TTS audio error:', e);
    };
    ttsCurrentAudio.play().catch(e => {
      if (btnEl) { btnEl.textContent = '🔊'; btnEl.classList.remove('playing'); delete btnEl.dataset._ttsKey; }
      ttsCurrentAudio = null;
      showToast('발음 재생 실패: ' + e.message);
      console.warn('TTS play() error:', e.message);
    });
  } catch (e) {
    if (btnEl) { btnEl.textContent = '🔊'; btnEl.classList.remove('playing'); delete btnEl.dataset._ttsKey; }
    showToast('발음 재생 실패: ' + e.message);
    console.warn('TTS error:', e.message);
  }
}

async function prefetchTTS(text, lang) {
  const key = text + ':' + lang;
  if (ttsMemCache[key]) return;
  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, lang })
    });
    if (!res.ok) return;
    const blob = await res.blob();
    ttsMemCache[key] = URL.createObjectURL(blob);
  } catch (e) { /* prefetch 실패는 무시 */ }
}

// ─── PODCAST MODE ────────────────────────────────────────────────────────────
let podcastPlaylist = [];
let podcastIndex = 0;
let podcastPlaying = false;
let podcastSpeed = 1.0;
let podcastAudio = null;
let podcastSegments = [];
let podcastSegIdx = 0;
let podcastMode = 'word+meaning'; // 'word' | 'word+meaning' | 'full'
let podcastRepeat = 1;
let podcastRepeatIdx = 0;
let podcastGap = 1.0;

function buildPodcastSegments(entry) {
  const lang = entry.lang || 'en';
  const segs = [];
  if (entry.word) segs.push({ text: entry.word, lang });
  if (podcastMode === 'word') return segs;
  const meaning = entry.short_meaning || (entry.nuance || '').slice(0, 80);
  if (meaning) segs.push({ text: meaning, lang: 'ko' });
  if (podcastMode === 'word+meaning') return segs;
  const example = lang === 'en'
    ? (entry.usages?.[0]?.example || '')
    : (entry.entries?.[0]?.example || '');
  if (example) segs.push({ text: example.slice(0, 200), lang });
  return segs;
}

function podcastStart() {
  const tab = currentWordbookTab;
  const words = wordbook.filter(w => (w.lang || 'en') === tab);
  if (words.length === 0) { showToast('단어장이 비어있습니다.'); return; }
  // 개별 TTS 정지
  if (ttsCurrentAudio) {
    ttsCurrentAudio.pause(); ttsCurrentAudio = null;
    document.querySelectorAll('.tts-btn').forEach(b => { b.textContent = '🔊'; b.classList.remove('playing'); });
  }
  const locale = { en: 'en', ko: 'ko', ja: 'ja', zh: 'zh' }[tab] || 'en';
  podcastPlaylist = words.slice().sort((a, b) => a.word.localeCompare(b.word, locale));
  podcastIndex = 0;
  podcastAudio = null;
  podcastSegments = [];
  podcastSegIdx = 0;
  podcastPlaying = true;
  _updatePodcastBtn();
  _showPodcastPlayer();
  _podcastPlayFromCurrentWord();
}

function _showPodcastPlayer() {
  document.getElementById('podcast-player').classList.add('show');
  document.body.style.paddingBottom = '300px';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play', () => {
      if (!podcastPlaying) {
        podcastPlaying = true; _updatePodcastBtn();
        if (podcastAudio && !podcastAudio.ended && podcastAudio.paused) {
          podcastAudio.playbackRate = podcastSpeed;
          podcastAudio.play().catch(() => {});
        } else { _podcastPlayFromCurrentWord(); }
      }
    });
    navigator.mediaSession.setActionHandler('pause', () => {
      if (podcastPlaying) { podcastPlaying = false; if (podcastAudio) podcastAudio.pause(); _updatePodcastBtn(); }
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => podcastNext());
    navigator.mediaSession.setActionHandler('previoustrack', () => podcastPrev());
  }
}

function hidePodcastPlayer() {
  podcastPlaying = false;
  if (podcastAudio) { podcastAudio.pause(); podcastAudio = null; }
  document.getElementById('podcast-player').classList.remove('show');
  document.body.style.paddingBottom = '';
  _updatePodcastBtn();
}

function _updatePodcastDisplay() {
  if (!podcastPlaylist.length) return;
  const entry = podcastPlaylist[podcastIndex];
  if (!entry) return;
  const flagMap = { en: '🇺🇸', ko: '🇰🇷', ja: '🇯🇵', zh: '🇨🇳' };
  document.getElementById('podcast-word').textContent = entry.word;
  document.getElementById('podcast-meaning').textContent = entry.short_meaning || '';
  document.getElementById('podcast-meta').textContent =
    `${flagMap[entry.lang || 'en'] || ''} ${podcastIndex + 1} / ${podcastPlaylist.length}`;
  const pct = podcastPlaylist.length > 1
    ? (podcastIndex / (podcastPlaylist.length - 1) * 100) : 0;
  document.getElementById('podcast-progress-fill').style.width = pct.toFixed(1) + '%';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: entry.word,
      artist: entry.short_meaning || 'Gotcha 단어장',
      album: '🎧 팟캐스트',
    });
  }
}

function _updatePodcastBtn() {
  const btn = document.getElementById('podcast-play-btn');
  if (btn) btn.textContent = podcastPlaying ? '⏸' : '▶';
}

async function _podcastPlayFromCurrentWord() {
  if (!podcastPlaying || !podcastPlaylist.length) return;
  const entry = podcastPlaylist[podcastIndex];
  if (!entry) { _podcastFinished(); return; }
  podcastRepeatIdx = 0;
  podcastSegments = buildPodcastSegments(entry);
  podcastSegIdx = 0;
  _updatePodcastDisplay();
  await _podcastPlayNextSeg();
}

async function _podcastPlayNextSeg() {
  if (!podcastPlaying) return;
  if (podcastSegIdx >= podcastSegments.length) {
    podcastRepeatIdx++;
    if (podcastRepeatIdx < podcastRepeat) {
      podcastSegments = buildPodcastSegments(podcastPlaylist[podcastIndex]);
      podcastSegIdx = 0;
      setTimeout(() => _podcastPlayNextSeg(), 600);
      return;
    }
    podcastRepeatIdx = 0;
    setTimeout(() => {
      if (!podcastPlaying) return;
      podcastIndex++;
      if (podcastIndex >= podcastPlaylist.length) _podcastFinished();
      else _podcastPlayFromCurrentWord();
    }, podcastGap * 1000);
    return;
  }
  const { text, lang } = podcastSegments[podcastSegIdx++];
  const key = text + ':' + lang;
  try {
    let url = ttsMemCache[key];
    if (!url) {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, lang })
      });
      if (!res.ok) throw new Error('TTS 실패');
      const blob = await res.blob();
      url = URL.createObjectURL(blob);
      ttsMemCache[key] = url;
    }
    if (!podcastPlaying) return;
    podcastAudio = new Audio(url);
    podcastAudio.playbackRate = podcastSpeed;
    podcastAudio.onended = () => setTimeout(() => _podcastPlayNextSeg(), 450);
    podcastAudio.onerror = () => setTimeout(() => _podcastPlayNextSeg(), 300);
    await podcastAudio.play();
  } catch (e) {
    console.warn('Podcast TTS error:', e);
    if (!podcastPlaying) return;
    setTimeout(() => _podcastPlayNextSeg(), 300);
  }
}

function _podcastFinished() {
  podcastPlaying = false;
  podcastAudio = null;
  podcastIndex = 0;
  _updatePodcastBtn();
  _updatePodcastDisplay();
  showToast('🎧 팟캐스트 재생 완료!');
}

function podcastTogglePlay() {
  if (podcastPlaying) {
    podcastPlaying = false;
    if (podcastAudio) podcastAudio.pause();
    _updatePodcastBtn();
  } else {
    podcastPlaying = true;
    _updatePodcastBtn();
    if (podcastAudio && !podcastAudio.ended && podcastAudio.paused) {
      podcastAudio.playbackRate = podcastSpeed;
      podcastAudio.play().catch(() => {});
    } else {
      _podcastPlayFromCurrentWord();
    }
  }
}

function podcastNext() {
  if (!podcastPlaylist.length || podcastIndex >= podcastPlaylist.length - 1) return;
  podcastPlaying = false;
  if (podcastAudio) { podcastAudio.pause(); podcastAudio = null; }
  podcastIndex++;
  podcastPlaying = true;
  _updatePodcastBtn();
  _podcastPlayFromCurrentWord();
}

function podcastPrev() {
  if (!podcastPlaylist.length || podcastIndex <= 0) return;
  podcastPlaying = false;
  if (podcastAudio) { podcastAudio.pause(); podcastAudio = null; }
  podcastIndex--;
  podcastPlaying = true;
  _updatePodcastBtn();
  _podcastPlayFromCurrentWord();
}

function setPodcastSpeed(speed) {
  podcastSpeed = speed;
  if (podcastAudio) podcastAudio.playbackRate = speed;
  document.querySelectorAll('.podcast-speed-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.speed) === speed);
  });
}

function setPodcastMode(mode) {
  podcastMode = mode;
  document.querySelectorAll('.podcast-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function setPodcastRepeat(count) {
  podcastRepeat = count;
  podcastRepeatIdx = 0;
  document.querySelectorAll('.podcast-repeat-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.repeat) === count);
  });
}

function setPodcastGap(gap) {
  podcastGap = gap;
  document.querySelectorAll('.podcast-gap-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.gap) === gap);
  });
}

// ─── BACK BUTTON BLOCK ───────────────────────────────────────────────────────
let _backBlockInstalled = false;

function setupBackButtonBlock() {
  // 로그인 상태에서 뒤로가기 누르면 앱 종료 대신 현재 화면 유지
  history.pushState({ app: 'gotcha' }, '');
  if (_backBlockInstalled) return;
  _backBlockInstalled = true;
  window.addEventListener('popstate', function () {
    if (getToken()) {
      history.pushState({ app: 'gotcha' }, '');
    }
  });
}

// Init
updateBadges();
initAuth();

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[SW] 등록 완료:', reg.scope))
      .catch(err => console.warn('[SW] 등록 실패:', err));
  });
}
</script>
