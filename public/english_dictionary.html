<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My English Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7ff;
    --surface: #ffffff;
    --surface2: #eef1fb;
    --border: #dde2f5;
    --accent: #4a6ef5;
    --accent2: #f54a7a;
    --accent3: #16a34a;
    --text: #1a1f3c;
    --text2: #4a5070;
    --text3: #9398b5;
    --correct: #16a34a;
    --wrong: #dc2626;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(74,110,245,0.07);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    padding: 14px 16px 14px 0;
    border-right: 1px solid var(--border);
    margin-right: 8px;
    white-space: nowrap;
  }

  .nav-tabs {
    display: flex;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .nav-tab:hover:not(.active) { color: var(--text); }

  .badge {
    display: inline-block;
    background: var(--accent2);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* MAIN */
  main {
    flex: 1;
    padding: 20px 16px 40px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* SEARCH */
  .search-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.danger { background: var(--wrong); }

  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp 0.3s ease;
    box-shadow: 0 4px 20px rgba(74,110,245,0.08);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-word {
    font-family: 'Sora', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .result-pos-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .result-pos-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .result-section {
    margin-bottom: 20px;
  }

  .result-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 10px;
  }

  .result-section-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }

  .usage-item {
    margin-bottom: 14px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--accent);
  }

  .usage-context {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .usage-desc {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.6;
  }

  .usage-example {
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-bottom: 4px;
  }

  .usage-translation {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }

  .similar-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .similar-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
  }

  .similar-word {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    min-width: 100px;
  }

  .similar-diff {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text2);
    font-size: 14px;
    padding: 20px 0;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* WORD LIST */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .word-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .alpha-section {
    margin-bottom: 8px;
  }

  .alpha-header {
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    padding: 6px 4px 4px;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 6px;
  }

  .alpha-words {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .word-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .word-chip:hover { border-color: var(--accent); }

  .word-chip-text {
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .word-chip-del {
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .word-chip-del:hover { color: var(--wrong); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; line-height: 1.6; }

  /* QUIZ */
  .quiz-start-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
  }

  .quiz-type-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin: 24px 0;
  }

  .quiz-type-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .quiz-type-btn:hover, .quiz-type-btn.selected {
    border-color: var(--accent);
    background: rgba(108,143,255,0.08);
  }

  .quiz-type-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .quiz-type-desc {
    font-size: 12px;
    color: var(--text3);
  }

  /* QUIZ CARD */
  .quiz-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    font-family: 'Sora', sans-serif;
  }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    animation: fadeUp 0.25s ease;
  }

  .quiz-type-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .quiz-question {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    line-height: 1.3;
    color: var(--text);
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .quiz-option {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .quiz-option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(108,143,255,0.08);
  }
  .quiz-option.correct {
    border-color: var(--correct);
    background: rgba(74,222,128,0.1);
    color: var(--correct);
  }
  .quiz-option.wrong {
    border-color: var(--wrong);
    background: rgba(248,113,113,0.1);
    color: var(--wrong);
  }
  .quiz-option:disabled { cursor: not-allowed; }

  .quiz-feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  .quiz-feedback.correct {
    background: rgba(74,222,128,0.1);
    color: var(--correct);
    border: 1px solid rgba(74,222,128,0.3);
    display: block;
  }
  .quiz-feedback.wrong {
    background: rgba(248,113,113,0.1);
    color: var(--wrong);
    border: 1px solid rgba(248,113,113,0.3);
    display: block;
  }

  .quiz-next-btn {
    width: 100%;
    margin-top: 16px;
    display: none;
  }

  /* RESULT */
  .quiz-result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    animation: fadeUp 0.3s ease;
  }

  .result-score {
    font-family: 'Sora', sans-serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: 12px 0 4px;
  }

  .result-score-label {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 24px;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* API KEY MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal-title {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .modal-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    font-family: 'Sora', sans-serif;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-error {
    font-size: 12px;
    color: var(--wrong);
    margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>

<div class="modal-overlay" id="auth-overlay">
  <div class="modal-box">
    <div class="modal-title">접근 제한</div>
    <div class="modal-desc">이 서비스를 이용하려면 비밀번호를 입력하세요.</div>
    <input class="modal-input" id="auth-input" type="password" placeholder="비밀번호" autocomplete="current-password" autofocus />
    <div class="modal-error" id="auth-error">비밀번호가 올바르지 않습니다.</div>
    <button class="btn" style="width:100%" onclick="submitAuth()">확인</button>
  </div>
</div>

<nav>
  <div class="nav-logo">📖 MyDict</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('search')">검색</button>
    <button class="nav-tab" onclick="showPage('wordbook')">단어장 <span class="badge" id="wordbook-count">0</span></button>
    <button class="nav-tab" onclick="showPage('quiz')">퀴즈</button>
    <button class="nav-tab" onclick="showPage('wrong')">오답노트 <span class="badge" id="wrong-count">0</span></button>
  </div>
</nav>

<main>

  <!-- SEARCH PAGE -->
  <div class="page active" id="page-search">
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="영어 단어 또는 상용구 입력..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn" id="search-btn" onclick="doSearch()">검색</button>
    </div>
    <div id="search-result"></div>
  </div>

  <!-- WORDBOOK PAGE -->
  <div class="page" id="page-wordbook">
    <div class="section-header">
      <div class="section-title">단어장</div>
      <button class="btn secondary" onclick="clearWordbook()" style="font-size:12px;padding:8px 14px;">전체 삭제</button>
    </div>
    <div id="wordbook-list"></div>
  </div>

  <!-- QUIZ PAGE -->
  <div class="page" id="page-quiz">
    <div id="quiz-container"></div>
  </div>

  <!-- WRONG NOTE PAGE -->
  <div class="page" id="page-wrong">
    <div class="section-header">
      <div class="section-title">오답 노트</div>
      <button class="btn secondary" onclick="clearWrong()" style="font-size:12px;padding:8px 14px;">전체 삭제</button>
    </div>
    <div id="wrong-list"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ─── AUTH ─────────────────────────────────────────────────────────────────────
if (localStorage.getItem('mydict_auth') === 'true') {
  document.getElementById('auth-overlay').classList.add('hidden');
}
document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});
async function submitAuth() {
  const pw = document.getElementById('auth-input').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      localStorage.setItem('mydict_auth', 'true');
      document.getElementById('auth-overlay').classList.add('hidden');
    } else {
      errEl.style.display = 'block';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  } catch {
    errEl.textContent = '서버 오류가 발생했습니다.';
    errEl.style.display = 'block';
  }
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let wordbook = JSON.parse(localStorage.getItem('mydict_wordbook') || '[]');
let wrongNote = JSON.parse(localStorage.getItem('mydict_wrong') || '[]');
let quizState = null;
let currentResult = null;

const HAIKU_MODEL = 'claude-haiku-4-5-20251001';

// ─── API CALL ─────────────────────────────────────────────────────────────────
async function callAI(userPrompt) {
  const res = await fetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: userPrompt }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text.replace(/```json|```/g, '').trim();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('mydict_wordbook', JSON.stringify(wordbook));
  localStorage.setItem('mydict_wrong', JSON.stringify(wrongNote));
  updateBadges();
}

function updateBadges() {
  document.getElementById('wordbook-count').textContent = wordbook.length;
  document.getElementById('wrong-count').textContent = wrongNote.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab')[['search','wordbook','quiz','wrong'].indexOf(name)].classList.add('active');
  if (name === 'wordbook') renderWordbook();
  if (name === 'quiz') renderQuizStart(false);
  if (name === 'wrong') renderWrongNote();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function selectSearchInput() {
  const input = document.getElementById('search-input');
  input.focus();
  input.select();
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  const resultDiv = document.getElementById('search-result');
  const btn = document.getElementById('search-btn');

  // 단어장에 이미 있으면 즉시 표시
  const cached = wordbook.find(w => w.word.toLowerCase() === query.toLowerCase());
  if (cached) {
    renderResult(cached, true);
    selectSearchInput();
    return;
  }

  resultDiv.innerHTML = `<div class="loading"><div class="spinner"></div>검색 중...</div>`;
  btn.disabled = true;

  const prompt = `You are an English dictionary assistant for a Korean learner. 
For the English word or phrase: "${query}"

Respond ONLY in valid JSON with this exact structure:
{
  "word": "the word/phrase",
  "pos": ["noun", "verb"],
  "short_meaning": "핵심 뜻만 한국어로 5단어 이내 (예: '늘 그렇듯이, 언제나처럼')",
  "nuance": "한국어로 통상적인 의미와 뉘앙스 설명 (2-4문장)",
  "usages": [
    {
      "context": "맥락 라벨 (예: 일반, 비즈니스, IT 등)",
      "description": "한국어로 이 맥락에서의 쓰임새 설명",
      "example": "English example sentence.",
      "translation": "예문의 한국어 해석"
    }
  ],
  "similar": [
    {
      "word": "similar English word",
      "diff": "한국어로 뉘앙스 차이 설명"
    }
  ]
}

For "pos", list all applicable parts of speech in English (e.g. noun, verb, adjective, adverb, preposition, conjunction, pronoun, interjection, phrase). Return 2-3 usages and 3-4 similar words. YOUR ENTIRE RESPONSE MUST BE A SINGLE VALID JSON OBJECT. DO NOT OUTPUT ANYTHING OTHER THAN THE JSON. DO NOT INCLUDE LEADING BACKTICKS LIKE \`\`\`json.`;

  try {
    const text = await callAI(prompt);
    const result = JSON.parse(text);
    currentResult = result;

    const alreadySaved = wordbook.some(w => w.word.toLowerCase() === result.word.toLowerCase());
    if (!alreadySaved) {
      wordbook.push({
        word: result.word,
        short_meaning: result.short_meaning || '',
        nuance: result.nuance,
        usages: result.usages,
        similar: result.similar,
        savedAt: Date.now()
      });
      save();
    }
    renderResult(result, alreadySaved);
    selectSearchInput();

  } catch (err) {
    resultDiv.innerHTML = `<div class="result-card" style="color:var(--wrong)">오류가 발생했습니다. 다시 시도해주세요.<br><small>${err.message}</small></div>`;
  }

  btn.disabled = false;
}

function renderResult(result, alreadySaved) {
  const posMap = {
    'noun': '명사', 'verb': '동사', 'adjective': '형용사', 'adverb': '부사',
    'preposition': '전치사', 'conjunction': '접속사', 'pronoun': '대명사',
    'interjection': '감탄사', 'phrase': '구', 'idiom': '관용어'
  };

  const posHtml = (result.pos || []).map(p =>
    `<span class="result-pos-tag">${posMap[p.toLowerCase()] || p}</span>`
  ).join('');

  const usagesHtml = result.usages.map(u => `
    <div class="usage-item">
      <div class="usage-context">${u.context}</div>
      <div class="usage-desc">${u.description}</div>
      <div class="usage-example">${u.example}</div>
      ${u.translation ? `<div class="usage-translation">→ ${u.translation}</div>` : ''}
    </div>
  `).join('');

  const similarHtml = result.similar.map(s => `
    <div class="similar-item">
      <div class="similar-word">${s.word}</div>
      <div class="similar-diff">${s.diff}</div>
    </div>
  `).join('');

  document.getElementById('search-result').innerHTML = `
    <div class="result-card">
      <div class="result-word">${result.word}</div>
      ${posHtml ? `<div class="result-pos-list">${posHtml}</div>` : ''}

      <div class="result-section">
        <div class="result-section-title">의미 & 뉘앙스</div>
        <div class="result-section-body">${result.nuance}</div>
      </div>

      <div class="result-section">
        <div class="result-section-title">쓰임새</div>
        ${usagesHtml}
      </div>

      <div class="result-section">
        <div class="result-section-title">유사한 단어</div>
        <div class="similar-list">${similarHtml}</div>
      </div>
    </div>
  `;
}

// ─── WORDBOOK ─────────────────────────────────────────────────────────────────
function renderWordbook() {
  const el = document.getElementById('wordbook-list');
  if (wordbook.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">아직 저장된 단어가 없어요.<br>검색하면 자동으로 저장됩니다.</div></div>`;
    return;
  }

  const sorted = [...wordbook].sort((a, b) => a.word.toLowerCase().localeCompare(b.word.toLowerCase()));

  // 알파벳별 그룹핑
  const groups = {};
  for (const w of sorted) {
    const letter = w.word[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(w);
  }

  const html = Object.keys(groups).sort().map(letter => `
    <div class="alpha-section">
      <div class="alpha-header">${letter}</div>
      <div class="alpha-words">
        ${groups[letter].map(w => `
          <div class="word-chip" onclick="searchFromWordbook('${w.word.replace(/'/g, "\\'")}')">
            <span class="word-chip-text">${w.word}</span>
            <span class="word-chip-del" onclick="event.stopPropagation();deleteWord('${w.word.replace(/'/g, "\\'")}')">×</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  el.innerHTML = `<div class="word-grid">${html}</div>`;
}

function searchFromWordbook(word) {
  document.getElementById('search-input').value = word;
  showPage('search');
  doSearch();
}

function deleteWord(word) {
  wordbook = wordbook.filter(w => w.word !== word);
  save();
  renderWordbook();
  showToast('단어를 삭제했습니다.');
}

function clearWordbook() {
  if (!confirm('단어장을 전체 삭제할까요?')) return;
  wordbook = [];
  save();
  renderWordbook();
  showToast('단어장을 비웠습니다.');
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
const QUIZ_TYPES = [
  { id: 'en2ko', label: '영어 → 한국어', desc: '영어 단어를 보고 알맞은 뜻을 고르세요' },
  { id: 'ko2en', label: '한국어 → 영어', desc: '한국어 뜻을 보고 알맞은 단어를 고르세요' },
  { id: 'similar', label: '유사어 찾기', desc: '가장 유사한 단어를 고르세요' }
];

let selectedQuizType = 'en2ko';
let isWrongQuiz = false;

function renderQuizStart(wrongMode) {
  isWrongQuiz = wrongMode;
  const pool = wrongMode ? wrongNote : wordbook;
  const container = document.getElementById('quiz-container');

  if (pool.length < 10) {
    container.innerHTML = `
      <div class="quiz-start-card">
        <div style="font-size:32px;margin-bottom:12px">${wrongMode ? '📝' : '📚'}</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:8px">${wrongMode ? '오답 퀴즈' : '퀴즈'}</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">
          ${wrongMode
            ? `오답 노트에 단어가 ${pool.length}개 있어요.<br>10개 이상 쌓이면 오답 퀴즈를 시작할 수 있어요.`
            : `단어장에 단어가 ${pool.length}개 있어요.<br>10개 이상 저장하면 퀴즈를 시작할 수 있어요.`}
        </div>
      </div>`;
    return;
  }

  container.innerHTML = `
    <div class="quiz-start-card">
      <div style="font-size:32px;margin-bottom:12px">${wrongMode ? '📝' : '🎯'}</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">${wrongMode ? '오답 퀴즈' : '퀴즈'}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px">${pool.length}개 단어 준비됨</div>

      <div style="font-size:12px;color:var(--text3);text-align:left;margin-bottom:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase">퀴즈 유형 선택</div>
      <div class="quiz-type-grid">
        ${QUIZ_TYPES.map(t => `
          <button class="quiz-type-btn ${t.id === selectedQuizType ? 'selected' : ''}" onclick="selectQuizType('${t.id}')">
            <div class="quiz-type-label">${t.label}</div>
            <div class="quiz-type-desc">${t.desc}</div>
          </button>
        `).join('')}
      </div>

      <button class="btn" style="width:100%" onclick="startQuiz()">퀴즈 시작</button>
      ${wrongMode ? '' : `<button class="btn secondary" style="width:100%;margin-top:8px" onclick="renderQuizStart(true)">오답 퀴즈 시작</button>`}
    </div>`;
}

function selectQuizType(type) {
  selectedQuizType = type;
  document.querySelectorAll('.quiz-type-btn').forEach((b, i) => {
    b.classList.toggle('selected', QUIZ_TYPES[i].id === type);
  });
}

function startQuiz() {
  const pool = isWrongQuiz ? wrongNote : wordbook;
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(10, pool.length));

  // Filter for similar quiz — need words with similar array
  let questions;
  if (selectedQuizType === 'similar') {
    const eligible = shuffled.filter(w => w.similar && w.similar.length >= 1);
    if (eligible.length < 4) {
      showToast('유사어 퀴즈를 위한 단어가 부족합니다.');
      return;
    }
    questions = eligible;
  } else {
    questions = shuffled;
  }

  quizState = {
    type: selectedQuizType,
    questions,
    current: 0,
    correct: 0,
    wrongWords: []
  };

  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { type, questions, current } = quizState;
  const q = questions[current];
  const container = document.getElementById('quiz-container');
  const total = questions.length;

  let questionText, options, correctIndex;

  if (type === 'en2ko') {
    questionText = q.word;
    const correctAnswer = q.short_meaning || q.nuance.slice(0, 30) + (q.nuance.length > 30 ? '...' : '');
    const wrongPool = wordbook.filter(w => w.word !== q.word).sort(() => Math.random() - 0.5);
    const wrongs = wrongPool.slice(0, 3).map(w => w.short_meaning || w.nuance.slice(0, 30) + (w.nuance.length > 30 ? '...' : ''));
    const fillers = ['해당 없음', '알 수 없음', '정의 없음'];
    while (wrongs.length < 3) wrongs.push(fillers[wrongs.length]);
    correctIndex = Math.floor(Math.random() * 4);
    options = [...wrongs];
    options.splice(correctIndex, 0, correctAnswer);
    options = options.slice(0, 4);

  } else if (type === 'ko2en') {
    questionText = q.short_meaning || q.nuance.slice(0, 30) + (q.nuance.length > 30 ? '...' : '');
    const wrongPool = wordbook.filter(w => w.word !== q.word).sort(() => Math.random() - 0.5);
    const wrongs = wrongPool.slice(0, 3).map(w => w.word);
    const fillers = ['other', 'none', 'unknown'];
    while (wrongs.length < 3) wrongs.push(fillers[wrongs.length]);
    correctIndex = Math.floor(Math.random() * 4);
    options = [...wrongs];
    options.splice(correctIndex, 0, q.word);
    options = options.slice(0, 4);

  } else {
    // similar
    const correctSimilar = q.similar[Math.floor(Math.random() * q.similar.length)];
    questionText = `"${q.word}"와 가장 유사한 단어는?`;
    const allWords = wordbook.flatMap(w => w.similar || []).map(s => s.word);
    const pool = [...new Set(allWords)].filter(w => w !== correctSimilar.word);
    const wrongs = pool.sort(() => Math.random() - 0.5).slice(0, 3);
    const fillers = ['none', 'other', 'unknown'];
    while (wrongs.length < 3) wrongs.push(fillers[wrongs.length]);
    correctIndex = Math.floor(Math.random() * 4);
    options = [...wrongs];
    options.splice(correctIndex, 0, correctSimilar.word);
    options = options.slice(0, 4);
  }

  const typeLabel = QUIZ_TYPES.find(t => t.id === type).label;
  const progress = ((current) / total * 100).toFixed(0);

  container.innerHTML = `
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${current + 1} / ${total}</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-type-tag">${typeLabel}</div>
      <div class="quiz-question">${questionText}</div>
      <div class="quiz-options">
        ${options.map((opt, i) => `
          <button class="quiz-option" onclick="selectOption(this, ${i}, ${correctIndex})">${opt}</button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="btn quiz-next-btn" id="quiz-next" onclick="nextQuestion()">
        ${current + 1 === total ? '결과 보기' : '다음 →'}
      </button>
    </div>`;
}

function selectOption(btn, selected, correct) {
  const options = document.querySelectorAll('.quiz-option');
  options.forEach(o => o.disabled = true);

  const isCorrect = selected === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  options[correct].classList.add('correct');

  const feedback = document.getElementById('quiz-feedback');
  feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  feedback.textContent = isCorrect ? '✓ 정답입니다!' : '✗ 틀렸습니다.';

  if (isCorrect) {
    quizState.correct++;
  } else {
    const q = quizState.questions[quizState.current];
    quizState.wrongWords.push(q);
    // Add to wrong note if not already there
    const already = wrongNote.some(w => w.word === q.word);
    if (!already) wrongNote.push(q);
    save();
  }

  document.getElementById('quiz-next').style.display = 'block';
}

function nextQuestion() {
  quizState.current++;
  if (quizState.current >= quizState.questions.length) {
    renderQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function renderQuizResult() {
  const { correct, questions, wrongWords } = quizState;
  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';

  document.getElementById('quiz-container').innerHTML = `
    <div class="quiz-result-card">
      <div style="font-size:36px">${emoji}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-score-label">${correct} / ${total} 정답</div>
      ${wrongWords.length > 0 ? `
        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:20px;text-align:left">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:700">오답 단어 (${wrongWords.length}개)</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${wrongWords.map(w => `<span style="background:rgba(248,113,113,0.15);color:var(--wrong);padding:4px 10px;border-radius:20px;font-size:13px;font-family:'Sora',sans-serif;font-weight:600">${w.word}</span>`).join('')}
          </div>
        </div>
      ` : ''}
      <div class="result-actions">
        <button class="btn" onclick="startQuiz()">다시 풀기</button>
        <button class="btn secondary" onclick="renderQuizStart(false)">퀴즈 메뉴로</button>
        ${wrongWords.length > 0 ? `<button class="btn" style="background:var(--accent2)" onclick="renderQuizStart(true)">오답 퀴즈 바로 시작</button>` : ''}
      </div>
    </div>`;
}

// ─── WRONG NOTE ───────────────────────────────────────────────────────────────
function renderWrongNote() {
  const el = document.getElementById('wrong-list');
  if (wrongNote.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎯</div><div class="empty-state-text">오답 노트가 비어있어요.<br>퀴즈를 풀면 틀린 단어가 여기 저장됩니다.</div></div>`;
    return;
  }

  const startBtn = wrongNote.length >= 10
    ? `<button class="btn" onclick="showPage('quiz');renderQuizStart(true)" style="font-size:12px;padding:8px 14px;">오답 퀴즈</button>`
    : `<span style="font-size:12px;color:var(--text3)">10개부터 퀴즈 가능</span>`;

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:13px;color:var(--text2)">${wrongNote.length}개</span>
      ${startBtn}
    </div>
    <div class="word-grid">${wrongNote.map((w, i) => `
      <div class="word-chip" onclick="searchFromWordbook('${w.word.replace(/'/g, "\\'")}')">
        <span class="word-chip-text" style="color:var(--accent2)">${w.word}</span>
        <span class="word-chip-del" onclick="event.stopPropagation();deleteWrong(${i})">×</span>
      </div>
    `).join('')}</div>`;
}

function deleteWrong(i) {
  wrongNote.splice(i, 1);
  save();
  renderWrongNote();
  showToast('오답 노트에서 삭제했습니다.');
}

function clearWrong() {
  if (!confirm('오답 노트를 전체 삭제할까요?')) return;
  wrongNote = [];
  save();
  renderWrongNote();
  showToast('오답 노트를 비웠습니다.');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// short_meaning 없는 단어 자동 백필
async function backfillShortMeanings() {
  const missing = wordbook.filter(w => !w.short_meaning);
  if (missing.length === 0) return;

  for (const w of missing) {
    try {
      const text = await callAI(`영어 단어 또는 표현 "${w.word}"의 핵심 뜻을 한국어로 5단어 이내로만 답하세요. 예: "늘 그렇듯이, 언제나처럼". 다른 설명 없이 뜻만 출력하세요.`);
      w.short_meaning = text.trim().replace(/"/g, '');
    } catch (e) {
      w.short_meaning = w.nuance.slice(0, 20);
    }
  }
  save();
}

// Init
updateBadges();
backfillShortMeanings();
</script>
